<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FreshMart | Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f4fff6;
    color: #333;
}

/* Header */
header {
    text-align: center;
    padding: 30px;
    background: #28a745;
    color: white;
}

/* Navbar */
nav {
    text-align: center;
    background: #1e7e34;
    padding: 12px;
}
nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 500;
}
nav a:hover {
    text-decoration: underline;
}

/* Main Section */
section {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
}

/* Form Box */
.form-box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    border-top: 5px solid #28a745;
}

.form-box h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #28a745;
}

/* Inputs */
.form-box input,
.form-box textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

/* Button */
.form-box input[type="submit"] {
    background: #28a745;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.form-box input[type="submit"]:hover {
    background: #1e7e34;
}

/* Footer */
footer {
    text-align: center;
    background: #28a745;
    color: white;
    padding: 20px;
}
</style>

</head>
<body>

<header>
    <h1>Contact & Customer Support</h1>
    <p>We are happy to help you 😊</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="products.php">Products</a>
    <a href="offers.html">Offers</a>
    <a href="cart.php">Cart</a>
</nav>

<section>

<div class="form-box">
    <h2>Contact Us</h2>

    <form>
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Message</label>
        <textarea rows="4" placeholder="Write your message"></textarea>

        <input type="submit" value="Send Message">
    </form>
</div>

</section>

<footer>
    <address>
        FreshMart Pvt Ltd<br>
        Customer Care: 1800-123-456<br>
        India<br>
        Email: support@freshmart.com
    </address>
</footer>

</body>
</html>
