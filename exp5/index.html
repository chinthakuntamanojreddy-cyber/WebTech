<html>
<head>
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">

   <style>
    body {
        text-align: center;
        font-family: Arial;
        background-color: linear-gradient(135deg, #f5f5f5, #e0e0e0);    
    }

    .box {
        width: 260px;
        margin: auto;
        background-color: linear-gradient(135deg, #f0f0f0, #dcdcdc);       
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0px 0px 10px gray;
    }

    input {
        width: 100%;
        height: 40px;
        font-size: 18px;
        text-align: right;
        margin-bottom: 10px;
        background-color: linear-gradient(135deg, #f0f0f0, #dcdcdc);    
    }

    button {
        width: 55px;
        height: 40px;
        margin: 2px;
        font-size: 16px;
        background-color: linear-gradient(135deg, #e0e0e0, #c0c0c0);    
        border: none;
        cursor: pointer;
    }

    button:hover {
        background-color: rgb(17, 17, 17);        /* Hover effect */
        color: white;
    }
</style>
</head>

<body>

<h2>Scientific Calculator</h2>

<div class="box">

    <!-- Display box -->
    <input type="text" id="result">

    <!-- Number buttons -->
    <button onclick="insert('7')">7</button>
    <button onclick="insert('8')">8</button>
    <button onclick="insert('9')">9</button>
    <button onclick="insert('/')">/</button><br>

    <button onclick="insert('4')">4</button>
    <button onclick="insert('5')">5</button>
    <button onclick="insert('6')">6</button>
    <button onclick="insert('*')">*</button><br>

    <button onclick="insert('1')">1</button>
    <button onclick="insert('2')">2</button>
    <button onclick="insert('3')">3</button>
    <button onclick="insert('-')">-</button><br>

    <button onclick="insert('0')">0</button>
    <button onclick="insert('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="insert('+')">+</button><br>

    <!-- Scientific buttons -->
    <button onclick="sin()">sin</button>
    <button onclick="cos()">cos</button>
    <button onclick="tan()">tan</button>
    <button onclick="sqrt()">√</button><br>

    <button onclick="square()">x²</button>
    <button onclick="log()">log</button>
    <button onclick="backspace()">⌫</button>
    <button onclick="clearScreen()">C</button>

</div>

 <script src="script.js"> </script>  

</body>
</html>
